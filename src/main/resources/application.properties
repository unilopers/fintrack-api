spring.application.name=Fintrack

#postgresql
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#jpa / hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# porta
server.port=8080

# garante que URLs sem handler lancam NoHandlerFoundException (capturada pelo GlobalExceptionHandler)
spring.mvc.throw-exception-if-no-handler-found=true

# SpringDoc OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# CORS - origens permitidas (separar por vírgula para múltiplas)
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}